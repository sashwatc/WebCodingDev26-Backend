# =============================================================================
# application-local.properties - the "local" Spring profile. Overrides selected
# defaults from application.properties for safe local development. Activated
# with SPRING_PROFILES_ACTIVE=local; does not contain real secrets.
# =============================================================================

# Safe local profile example. Do not commit real secrets.
# Run with: SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
# Point at a local MongoDB by default, with short timeouts so startup fails fast
# when no DB is running. Override with MONGO_URI to use a different instance.
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/lostthenfound?serverSelectionTimeoutMS=1000&connectTimeoutMS=1000}
# Local database name (defaults to lostthenfound).
spring.mongodb.database=${MONGO_DATABASE:lostthenfound}
# Skip automatic index creation locally for faster, lower-friction startup.
spring.data.mongodb.auto-index-creation=false
# Default to NOT seeding demo data locally.
app.seed.enabled=${SEED_DATA_ENABLED:false}
# Disable AI matchmaking locally by default (avoids external API calls/keys).
app.ai.matchmaking.enabled=${AI_MATCHMAKING_ENABLED:false}
# Local profile keeps the demo-account header sign-in available.
# Enables the X-Demo-User-Email header fallback so demo accounts work without
# a real Appwrite session (insecure - intentionally local/demo only).
app.auth.demo-fallback-enabled=${AUTH_DEMO_FALLBACK_ENABLED:true}
