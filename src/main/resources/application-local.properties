# Safe local profile example. Do not commit real secrets.
# Run with: SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/lostthenfound?serverSelectionTimeoutMS=1000&connectTimeoutMS=1000}
spring.mongodb.database=${MONGO_DATABASE:lostthenfound}
spring.data.mongodb.auto-index-creation=false
app.seed.enabled=${SEED_DATA_ENABLED:false}
app.ai.matchmaking.enabled=${AI_MATCHMAKING_ENABLED:false}
# Local profile keeps the demo-account header sign-in available.
app.auth.demo-fallback-enabled=${AUTH_DEMO_FALLBACK_ENABLED:true}
