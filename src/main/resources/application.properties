spring.application.name=WebCodingDev26Backend
server.port=${PORT:8080}
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/lost-then-found;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
app.frontend-url=${FRONTEND_URL:}
app.admin-email=${ADMIN_EMAIL:avery.patel@pleasantvalley.edu}
app.seed.enabled=${SEED_DATA_ENABLED:true}
