# =============================================================================
# application.properties - default Spring Boot configuration for the
# Lost Then Found backend. Most values read from environment variables with a
# fallback after the colon (${VAR:default}). Override per-environment via env
# vars, a .env file, or the `local` profile (application-local.properties).
# =============================================================================

# Logical name of this Spring Boot application.
spring.application.name=WebCodingDev26Backend
# Optionally import .env / .env.local files (as .properties) if present, so
# secrets can be supplied locally without committing them.
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]
# Disable DevTools auto-restart and LiveReload (not used in this deployment).
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
# HTTP port the server binds to; defaults to 8080 when PORT is unset.
server.port=${PORT:8080}
# MongoDB connection string (required; no default - app fails fast if unset).
# Both the legacy and current property keys are set for compatibility.
spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.uri=${MONGO_URI}
# Target MongoDB database name; defaults to "lostthenfound".
spring.mongodb.database=${MONGO_DATABASE:lostthenfound}
# Let Spring Data create indexes declared on entities at startup.
spring.data.mongodb.auto-index-creation=true
# JSON (Jackson) settings: serialize fields as snake_case to match the API
# contract, omit null fields, and ignore unknown fields when deserializing.
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
# Public frontend URL(s) used for links/CORS. Two keys exist for compatibility:
# the dashed key defaults to empty, the dotted key defaults to the prod domain.
app.frontend-url=${FRONTEND_URL:}
app.frontend.url=${FRONTEND_URL:https://pvhs-lostfound.app}
# Email address treated as the privileged admin account for the demo.
app.admin-email=${ADMIN_EMAIL:avery.patel@pleasantvalley.edu}
# Honors the legacy X-Demo-User-Email header for local development / demos only.
# Secure by default: production requires a verified Appwrite session. Local & demo
# environments opt in explicitly via AUTH_DEMO_FALLBACK_ENABLED=true
# (set in .env.local and the local profile so the demo accounts keep working).
app.auth.demo-fallback-enabled=${AUTH_DEMO_FALLBACK_ENABLED:false}
# Public Appwrite config exposed to the browser via /appwrite-config.js:
# endpoint + project id enable auth; the database/collection/team ids enable
# the student-admin chat feature. All default to empty (feature disabled).
app.appwrite.endpoint=${VITE_APPWRITE_ENDPOINT:}
app.appwrite.project-id=${VITE_APPWRITE_PROJECT_ID:}
app.appwrite.database-id=${VITE_APPWRITE_DATABASE_ID:}
app.appwrite.chat-conversations-collection-id=${VITE_APPWRITE_CHAT_CONVERSATIONS_COLLECTION_ID:}
app.appwrite.chat-messages-collection-id=${VITE_APPWRITE_CHAT_MESSAGES_COLLECTION_ID:}
app.appwrite.admin-team-id=${VITE_APPWRITE_ADMIN_TEAM_ID:}
# Seed demo data into MongoDB on startup (default on for the demo).
app.seed.enabled=${SEED_DATA_ENABLED:true}
# AI-assisted matchmaking (lost<->found) settings.
# Toggle the feature on/off.
app.ai.matchmaking.enabled=${AI_MATCHMAKING_ENABLED:true}
# SECRET: API key for the AI provider (empty by default; never commit a real key).
app.ai.matchmaking.api-key=${AI_API_KEY:}
# Chat-completions endpoint used for matchmaking (defaults to OpenAI).
app.ai.matchmaking.base-url=${AI_MATCHMAKING_BASE_URL:https://api.openai.com/v1/chat/completions}
# Model name for matchmaking requests.
app.ai.matchmaking.model=${AI_MATCHMAKING_MODEL:gpt-4o-mini}
# Max candidate found-items to send to the model per match request.
app.ai.matchmaking.max-candidates=${AI_MATCHMAKING_MAX_CANDIDATES:8}
# Minimum confidence (%) for a match to be surfaced to users.
app.ai.matchmaking.min-confidence=${AI_MATCHMAKING_MIN_CONFIDENCE:35}
# Optional local Ollama vision model for image-based assistance.
# Enable the Ollama integration.
app.ai.assistance.ollama-enabled=${AI_ASSISTANCE_OLLAMA_ENABLED:false}
# Base URL of the local Ollama server.
app.ai.assistance.ollama-url=${AI_ASSISTANCE_OLLAMA_URL:http://localhost:11434}
# Ollama model to use (llava = vision-capable).
app.ai.assistance.ollama-model=${AI_ASSISTANCE_OLLAMA_MODEL:llava}
# Notification delivery mode; "mock" logs/stores instead of really sending.
app.notifications.mode=${NOTIFICATIONS_MODE:mock}
# Email provider selection (e.g. resend) and its credentials.
app.notifications.email.provider=${EMAIL_PROVIDER:resend}
# SECRET: Resend API key (empty by default; never commit a real key).
app.notifications.resend.api-key=${RESEND_API_KEY:}
# From-address used for Resend emails.
app.notifications.resend.from=${RESEND_FROM:lostthenfound@pvhs.demo}
# SMS provider selection (e.g. twilio) and its credentials.
app.notifications.sms.provider=${SMS_PROVIDER:twilio}
# SECRET: Twilio account SID.
app.notifications.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
# SECRET: Twilio auth token (never commit a real value).
app.notifications.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
# Twilio sending phone number.
app.notifications.twilio.from-number=${TWILIO_FROM_NUMBER:}
# Optional outbound webhook for notifications and its signing secret.
app.notifications.webhook.url=${NOTIFICATION_WEBHOOK_URL:}
# SECRET: shared secret used to sign notification webhook payloads.
app.notifications.webhook.secret=${NOTIFICATION_WEBHOOK_SECRET:}
# When true, emails are simulated for the demo rather than actually sent.
app.email.demo-mode=${EMAIL_DEMO_MODE:true}
# Default from-address for app emails.
app.email.from=${EMAIL_FROM:lostthenfound@pvhs.demo}
# Human-readable pickup location and hours shown to claimants.
app.pickup.location=${PICKUP_LOCATION:PVHS Main Office pickup station}
app.pickup.hours=${PICKUP_HOURS:School days, 8:00 AM-3:30 PM}
