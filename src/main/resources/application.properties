spring.application.name=WebCodingDev26Backend
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.uri=${MONGO_URI}
spring.mongodb.database=${MONGO_DATABASE:lostthenfound}
spring.data.mongodb.auto-index-creation=true
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
app.frontend-url=${FRONTEND_URL:}
app.admin-email=${ADMIN_EMAIL:avery.patel@pleasantvalley.edu}
app.seed.enabled=${SEED_DATA_ENABLED:true}
